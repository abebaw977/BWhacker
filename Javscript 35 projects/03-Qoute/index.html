<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 10;
      background-color: #f0f0f0;
    }
    
    .qoute {
      background: #f9f9f9;
      padding: 12px 16px;
      border-radius: 10px;
      width: 90%;
    }
    
    p:nth-child(1) {
      font-size: 30px;
      font-weight: 700;
      text-transform: capitalize;
    }
    
    p:nth-child(2),
    p:nth-child(3) {
      font-size: 17px;
      position: relative;
      left: 20px;
      line-height: 5px;
      color: #333;
      text-transform: capitalize;
    }
    
    .qoute #text {
      height: fit-content;
      color: #222;
      display: flex;
      padding: 14px 17px;
      text-align: center;
    }
    
    .qoute button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px #ddd solid;
      font-size: 17px;
      font-weight: 440;
    }
    
    .loader-container {
      position: relative;
      left:40%;
      width: 100%;
      height: 100px;
      display: none;
    }
    
    .loader {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #3498db;
      border-radius: 100%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }
    
    #err {
      color: red;
      font-weight: bod;
    }
    
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="qoute" class="qoute">
    <p>random qoute</p>
    <p>author: <b id="aut"></b></p>
    <p>Qoute
    <div id="lod" class="loader-container">
      <div class="loader"></div>
    </div>
    <div id=text></div>
    <p id="err"></p>
    </p>
    <button onclick="Random()">Random</button>
    <button onclick="Online()">Online</button>
  </div>
  </div>
  <script>
    let Found = false;
    let Qoute = document.getElementById("text");
    let auth = document.getElementById("aut");
    let text = document.getElementById("text");
    let r = Math.floor(Math.random() * 10)
    let load = document.getElementById("lod")
    let Perr = document.getElementById("err");
    let con = [{
      text: "The only way to do great work is to love what you do.",
      author: "Steve Jobs",
    },
    {
      text: "Strive not to be a success, but rather to be of value.",
      author: "Albert Einstein",
    },
    {
      text: "The future belongs to those who believe in the beauty of their dreams.",
      author: "Eleanor Roosevelt",
    }, ]
    auth.textContent = con[2].author
    text.textContent = con[2].text
    
    function Random() {
      let r = Math.floor(Math.random() * 3)
      auth.textContent = con[r].author
      text.textContent = con[r].text
    }
    
    function Online() {
      load.style.display = "block"
      Qoute.style.display = "none"
      let options = {
        method: "GET",
        headers: {
          accept: 'application/json',
          'x-happi-token': 'hk318-kqHWrigUbzgDt7EngReMfiYXuhZo4Xuwmj'
        }
      }
      const all = "";
      fetch("https://api.happi.dev/v1/quotes?language=EN&limit=10&related_to=string", options)
        .then(res => res.json())
        .then(res => {
          auth.textContent = res.quotes[r].author
          text.textContent = res.quotes[r].quote
          load.style.display = "none"
          Qoute.style.display = "block"
          Found = true
          Perr.textContent=""
        })
        .catch(e => {
          if (Found != true) {
            Perr.textContent = e;
          }
        })
    }
  </script>
</body>
</html>
