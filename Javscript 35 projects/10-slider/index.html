<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slider</title>
  <style>
    .slider {
      padding: 10px;
      background: #f1f8f8;
      border-radius: 10px;
      position: relative;
    }
    
    .slider p:first-child {
      font-size: 30px;
      font-weight: 700;
      text-transform: capitalize;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f0f0;
      margin: 0;
    }
    
    .slider {
      width: 600px;
      height: 400px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    
    .img {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.8s ease-in-out;
    }
    
    .img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div class="slider">
    <div id="img" class="img">
      <img id="img1" src="img1.jpg" alt="r" />
      <img id="img2" src="img2.jpg" alt=r"" />
      <img id="img3" src="img3.png" alt="r" />
    </div>
    <p>Slider</p>
    
    <button onclick="chnage()">change</button>
    
    <script>
      //function chnage(){
      let images= document.querySelectorAll(".img img")
      let slides= document.getElementById("img")
      let index = 0
      
      function slide(i) {
       /* if (i < 0) {index = images.length - 1;console.log("Yes")}
        else*/ 
        if (i >= images.length) {index = 0;console.log("YesY")}
        
        else{ index = i;console.log(index," ",i)};
        slides.style.transform = `translateX(${-index * 100}%)`;
      }
      setInterval(()=> slide(index+1), 2000)
    </script>
  </div>
</body>

</html>
